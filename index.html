<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AETHER | SYSTEMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Outfit", "sans-serif"],
              body: ["Rajdhani", "sans-serif"],
              mono: ["Share Tech Mono", "monospace"],
            },
            colors: {
              nebula: {
                base: '#030014', // Deep Space
                glass: 'rgba(255, 255, 255, 0.05)',
                border: 'rgba(255, 255, 255, 0.1)',
                accent: '#a855f7', // Purple
                cyan: '#06b6d4',
                highlight: '#e879f9'
              }
            },
            backgroundImage: {
              'nebula-gradient': "radial-gradient(circle at 50% 0%, #2e1065 0%, #030014 60%)",
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #030014;
        color: #e5e7eb;
        overflow-x: hidden;
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #030014;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(168, 85, 247, 0.3);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(168, 85, 247, 0.6);
      }
      
      .glass-panel {
        background: rgba(10, 10, 20, 0.4);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      
      .text-glow {
        text-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
      }
    </style>
